<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעקב עישון</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3f4f8;
      --card: #ffffff;
      --primary: #2d1a40;
      --primary-fg: #ffffff;
      --accent: #a855f7;
      --accent-light: rgba(168,85,247,0.12);
      --accent-fg: #ffffff;
      --muted: #e8eaf0;
      --muted-fg: #6b7280;
      --border: #e2e5ec;
      --text: #111827;
      --destructive: #ef4444;
      --radius: 0.75rem;
      --font: 'Heebo', sans-serif;
      --font-display: 'Rubik', sans-serif;
    }

    body {  font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* TOP BAR */
    .topbar { background: var(--primary); color: var(--primary-fg); height: 64px; display: flex; align-items: center; padding: 0 20px; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.18); position: sticky; top: 0; z-index: 30; }
    .topbar-logo { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .topbar h1 { font-family: var(--font-display); font-size: 18px; font-weight: 700; }

    /* LAYOUT */
    .app-body { display: flex; flex: 1; overflow: hidden; }

    /* SIDEBAR */
    .sidebar { width: 230px; background: var(--primary); color: var(--primary-fg); display: flex; flex-direction: column; padding: 16px 12px; gap: 4px; flex-shrink: 0; overflow-y: auto; }
    .sidebar-nav-btn { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: var(--radius); border: none; background: transparent; color: var(--primary-fg); font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; opacity: 0.75; transition: all 0.15s; text-align: right; width: 100%; }
    .sidebar-nav-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }
    .sidebar-nav-btn.active { opacity: 1; background: var(--accent); color: #fff; font-weight: 600; }

    .sidebar-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 12px 4px; }
    .sidebar-section-title { font-size: 10px; font-weight: 700; opacity: 0.45; text-transform: uppercase; letter-spacing: 0.08em; padding: 0 14px 6px; }

    /* STATS BLOCK */
    .stat-block { padding: 10px 14px; }
    .stat-item { display: flex; flex-direction: column; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .stat-item:last-child { border-bottom: none; }
    .stat-label { font-size: 11px; opacity: 0.55; margin-bottom: 3px; }
    .stat-value { font-family: var(--font-display); font-size: 18px; font-weight: 700; }
    .stat-sub { font-size: 11px; opacity: 0.5; margin-top: 2px; }

    /* MAIN */
    .main { flex: 1; overflow-y: auto; padding: 28px 20px; }
    .container { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    /* SUMMARY CARDS ROW */
    .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .summary-card { background: var(--primary); color: var(--primary-fg); border-radius: 18px; padding: 18px 20px; box-shadow: 0 4px 20px rgba(45,26,64,0.18); }
    .summary-card.accent-card { background: linear-gradient(135deg, #7c3aed, #a855f7); }
    .summary-label { font-size: 11px; opacity: 0.65; margin-bottom: 5px; }
    .summary-amount { font-family: var(--font-display); font-size: 28px; font-weight: 700; }
    .summary-sub { font-size: 11px; opacity: 0.55; margin-top: 3px; }

    /* BUTTON */
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { opacity: 0.9; }
    .btn-full { width: 100%; height: 48px; }
    .btn-ghost { background: transparent; color: var(--muted-fg); font-size: 13px; padding: 8px 12px; }
    .btn-danger { background: transparent; color: var(--destructive); font-size: 12px; padding: 8px 0; display: flex; align-items: center; gap: 6px; border: none; cursor: pointer; font-family: var(--font); }
    .btn-danger:hover { opacity: 0.75; }

    /* BIG SMOKE BUTTON */
    .smoke-now-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; border: none; border-radius: 20px; font-family: var(--font-display); font-size: 18px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 24px rgba(168,85,247,0.35); transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .smoke-now-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(168,85,247,0.45); }
    .smoke-now-btn:active { transform: translateY(0); }

    /* FORM */
    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .form-header { display: flex; align-items: center; justify-content: space-between; }
    .form-header h3 { font-size: 15px; font-weight: 700; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 12px; font-weight: 500; color: var(--muted-fg); }
    input[type=text], input[type=datetime-local], textarea { padding: 10px 13px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 14px; background: var(--bg); color: var(--text); width: 100%; outline: none; transition: border 0.15s; }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: none; }

    /* SMOKE CARD */
    .smoke-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); transition: box-shadow 0.2s; }
    .smoke-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .smoke-main { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; }
    .smoke-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .smoke-info { flex: 1; min-width: 0; }
    .smoke-num { font-size: 14px; font-weight: 700; }
    .smoke-time-row { font-size: 12px; color: var(--muted-fg); margin-top: 2px; }
    .smoke-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .smoke-day { font-size: 11px; color: var(--muted-fg); text-align: left; }
    .chevron { color: var(--muted-fg); transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }
    .smoke-detail { padding: 0 16px 16px; border-top: 1px solid var(--border); display: none; }
    .smoke-detail.open { display: block; }
    .detail-row { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--muted-fg); margin-top: 12px; }

    /* MONTHLY PAGE */
    .month-card { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.2s; width: 100%; }
    .month-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .month-left { display: flex; align-items: center; gap: 14px; }
    .month-icon { width: 48px; height: 48px; background: var(--accent-light); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .month-name { font-size: 15px; font-weight: 600; }
    .month-count { font-size: 12px; color: var(--muted-fg); margin-top: 2px; }
    .month-amount { display: flex; align-items: center; gap: 8px; }
    .month-total { font-family: var(--font-display); font-size: 18px; font-weight: 700; }
    .back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted-fg); background: none; border: none; cursor: pointer; font-family: var(--font); padding: 0; }
    .back-btn:hover { color: var(--text); }

    /* EMPTY */
    .empty { text-align: center; padding: 60px 20px; }
    .empty-icon { width: 64px; height: 64px; background: var(--muted); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 14px; }
    .empty p { font-size: 14px; color: var(--muted-fg); }

    .section-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .section-sub { font-size: 13px; color: var(--muted-fg); }

    .list { display: flex; flex-direction: column; gap: 10px; }
    .hidden { display: none !important; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .summary-row { grid-template-columns: 1fr; }
    }

    .mobile-menu-btn {
  margin-right: auto;
  display: none;
  background: var(--accent);
  color: var(--accent-fg);
  border: none;
  border-radius: 10px;
  width: 38px;
  height: 38px;
  font-size: 22px;
  font-weight: 900;
  cursor: pointer;
}

@media (max-width: 600px) {
  .mobile-menu-btn {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sidebar {
    display: flex;
    position: fixed;
    top: 64px;
    right: 0;
    height: calc(100vh - 64px);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }

  .sidebar.open {
    transform: translateX(0);
  }
}

/* פס עליון כהה */
.top-strip {
  height: 35px;
  background: #16223d;
  width: 100%;
  flex-shrink: 0;
}
  </style>
</head>
<body>
<div class="top-strip"></div>

<header class="topbar">
  <div class="topbar-logo">🚬</div>
  <h1>מעקב עישון</h1>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
</header>

<div class="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="sidebar-nav-btn active" id="nav-home" onclick="showPage('home')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      היום
    </button>
    <button class="sidebar-nav-btn" onclick="location.href='index.html'">
  ₪ חזרה להוצאות
</button>
    <button class="sidebar-nav-btn" id="nav-monthly" onclick="showPage('monthly')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      סיכום חודשי
    </button>

    <div class="sidebar-divider"></div>
    <div class="sidebar-section-title">סטטיסטיקה</div>

    <div class="stat-block">
      <div class="stat-item">
        <div class="stat-label">ממוצע זמן בין סיגריות</div>
        <div class="stat-value" id="stat-avg-gap">—</div>
        <div class="stat-sub" id="stat-avg-gap-sub"></div>
      </div>
      <div class="stat-item">
        <div class="stat-label">הכי ארוך ללא עישון</div>
        <div class="stat-value" id="stat-longest">—</div>
        <div class="stat-sub" id="stat-longest-sub"></div>
      </div>
      <div class="stat-item">
        <div class="stat-label">סה״כ כל הזמנים</div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-sub">סיגריות</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">ממוצע יומי (30 יום)</div>
        <div class="stat-value" id="stat-daily-avg">0</div>
        <div class="stat-sub">סיגריות ביום</div>
      </div>
    </div>
  </aside>

  <main class="main">

    <!-- HOME PAGE -->
    <div id="page-home" class="container">

      <!-- Summary row -->
      <div class="summary-row">
        <div class="summary-card">
          <div class="summary-label" id="summary-month-label">החודש</div>
          <div class="summary-amount" id="summary-month">0</div>
          <div class="summary-sub">סיגריות החודש</div>
        </div>
        <div class="summary-card accent-card">
          <div class="summary-label">השבוע</div>
          <div class="summary-amount" id="summary-week">0</div>
          <div class="summary-sub">סיגריות השבוע</div>
        </div>
      </div>

      <!-- Quick log button -->
      <button class="smoke-now-btn" onclick="quickLog()">
        🚬&nbsp; עישנתי עכשיו
      </button>

      <!-- Add with details toggle -->
      <button class="btn btn-full" id="toggle-form-btn"
        style="background:#fff;border:1.5px dashed var(--border);color:var(--muted-fg);border-radius:14px;font-size:14px;"
        onclick="toggleForm()">
        + הוסף עם פרטים / עבר
      </button>

      <!-- Detail Form -->
      <div class="form-card hidden" id="smoke-form-card">
        <div class="form-header">
          <h3>תיעוד סיגריה</h3>
          <button class="btn btn-ghost" onclick="toggleForm()">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="form-group">
          <label for="input-reason">סיבה / תיאור (לא חובה)</label>
          <textarea id="input-reason" rows="2" placeholder="למשל: אחרי ארוחה, בלחץ בעבודה..."></textarea>
        </div>
        <div class="form-group">
          <label for="input-datetime">תאריך ושעה</label>
          <input type="datetime-local" id="input-datetime" />
        </div>
        <button class="btn btn-accent btn-full" onclick="saveSmoke()">שמור</button>
      </div>

      <!-- List -->
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--muted-fg);margin-bottom:10px;" id="list-title">היום</div>
        <div class="list" id="smoke-list"></div>
        <div class="empty hidden" id="home-empty">
          <div class="empty-icon">🚭</div>
          <p>עדיין לא עישנת היום</p>
        </div>
      </div>
    </div>

    <!-- MONTHLY PAGE -->
    <div id="page-monthly" class="container hidden">

      <!-- Month detail -->
      <div id="month-detail" class="hidden">
        <button class="back-btn" onclick="closeMonthDetail()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          חזרה לכל החודשים
        </button>
        <div style="height:16px"></div>
        <div class="summary-card" id="detail-summary-card">
          <div class="summary-label" id="detail-label"></div>
          <div class="summary-amount" id="detail-amount"></div>
          <div class="summary-sub" id="detail-sub"></div>
        </div>
        <div style="height:16px"></div>
        <div class="list" id="detail-smoke-list"></div>
        <div class="empty hidden" id="detail-empty">
          <div class="empty-icon">🚭</div>
          <p>אין רשומות בחודש זה</p>
        </div>
      </div>

      <!-- Month list -->
      <div id="month-list-view">
        <div class="section-title">סיכום חודשי</div>
        <div class="section-sub" style="margin-bottom:16px">כל הסיגריות לפי חודשים</div>
        <div class="list" id="monthly-list"></div>
        <div class="empty hidden" id="monthly-empty">
          <div class="empty-icon">📅</div>
          <p>עדיין אין היסטוריה</p>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
  const STORAGE_KEY = 'smoking_tracker_data';
  const HEBREW_DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const HEBREW_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

  let currentDetailMonth = null;

  // ---- STORAGE ----
  function getSmokes() { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : []; }
  function saveSmokes(smokes) { localStorage.setItem(STORAGE_KEY, JSON.stringify(smokes)); }

  function getMonthKey(date) { return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`; }
  function getCurrentMonthKey() { return getMonthKey(new Date()); }
  function getMonthLabel(key) { const [y,m]=key.split('-'); return `${HEBREW_MONTHS[parseInt(m)-1]} ${y}`; }

  function getWeekStart() {
    const now = new Date();
    const day = now.getDay();
    const diff = now.getDate() - day;
    const start = new Date(now.setDate(diff));
    start.setHours(0,0,0,0);
    return start;
  }
  function getTodayStart() { const d=new Date(); d.setHours(0,0,0,0); return d; }

  // ---- NAV ----
function showPage(page) {
  document.getElementById('page-home').classList.toggle('hidden', page !== 'home');
  document.getElementById('page-monthly').classList.toggle('hidden', page !== 'monthly');

  document.getElementById('nav-home').classList.toggle('active', page === 'home');
  document.getElementById('nav-monthly').classList.toggle('active', page === 'monthly');

  if (page === 'monthly') renderMonthly();

  if (window.innerWidth <= 600) {
    document.querySelector(".sidebar").classList.remove("open");
  }
}

  // ---- FORM ----
  function toggleForm() {
    const f = document.getElementById('smoke-form-card');
    const btn = document.getElementById('toggle-form-btn');
    const hidden = f.classList.contains('hidden');
    f.classList.toggle('hidden', !hidden);
    btn.classList.toggle('hidden', !hidden);
    if (hidden) {
      // set default datetime to now
      const now = new Date();
      now.setSeconds(0,0);
      const local = new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
      document.getElementById('input-datetime').value = local;
    }
  }

  function quickLog() {
    const now = new Date();
    addSmoke(now, '');
  }

  function saveSmoke() {
    const reason = document.getElementById('input-reason').value.trim();
    const dtVal = document.getElementById('input-datetime').value;
    const dt = dtVal ? new Date(dtVal) : new Date();
    addSmoke(dt, reason);
    document.getElementById('input-reason').value = '';
    toggleForm();
  }

  function addSmoke(date, reason) {
    const smokes = getSmokes();
    smokes.push({
      id: Date.now().toString() + Math.random(),
      timestamp: date.toISOString(),
      date: date.toLocaleDateString('he-IL'),
      time: date.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'}),
      dayName: HEBREW_DAYS[date.getDay()],
      monthKey: getMonthKey(date),
      reason
    });
    smokes.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    saveSmokes(smokes);
    renderAll();
  }

  function deleteSmoke(id) {
    if (!confirm('למחוק רשומה זו?')) return;
    saveSmokes(getSmokes().filter(s => s.id !== id));
    renderAll();
    if (currentDetailMonth) renderMonthDetail(currentDetailMonth);
    renderMonthly();
  }

  // ---- RENDER ALL ----
  function renderAll() {
    renderSummary();
    renderList();
    renderStats();
  }

  function renderSummary() {
    const smokes = getSmokes();
    const monthKey = getCurrentMonthKey();
    const weekStart = getWeekStart();
    const monthCount = smokes.filter(s => s.monthKey === monthKey).length;
    const weekCount = smokes.filter(s => new Date(s.timestamp) >= weekStart).length;
    document.getElementById('summary-month-label').textContent = getMonthLabel(monthKey);
    document.getElementById('summary-month').textContent = monthCount;
    document.getElementById('summary-week').textContent = weekCount;
  }

  function renderList() {
    const todayStart = getTodayStart();
    const smokes = getSmokes().filter(s => new Date(s.timestamp) >= todayStart);
    const list = document.getElementById('smoke-list');
    const empty = document.getElementById('home-empty');
    document.getElementById('list-title').textContent = `היום · ${smokes.length} סיגריות`;
    if (smokes.length === 0) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
    } else {
      empty.classList.add('hidden');
      list.innerHTML = smokes.map((s, i) => smokeCardHTML(s, smokes.length - i)).join('');
    }
  }

  function smokeCardHTML(s, num) {
    return `
      <div class="smoke-card" id="sc-${s.id}">
        <div class="smoke-main" onclick="toggleSmokeCard('${s.id}')">
          <div class="smoke-icon">🚬</div>
          <div class="smoke-info">
            <div class="smoke-num">סיגריה #${num}</div>
            <div class="smoke-time-row">יום ${esc(s.dayName)} · ${esc(s.time)}</div>
            ${s.reason ? `<div class="smoke-time-row" style="margin-top:2px;font-style:italic">"${esc(s.reason)}"</div>` : ''}
          </div>
          <div class="smoke-right">
            <div class="smoke-day">${esc(s.date)}</div>
            <svg class="chevron" id="chev-${s.id}" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="smoke-detail" id="sd-${s.id}">
          <div class="detail-row">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>${esc(s.date)} · יום ${esc(s.dayName)} · ${esc(s.time)}</span>
          </div>
          ${s.reason ? `<div class="detail-row"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>${esc(s.reason)}</span></div>` : ''}
          <button class="btn-danger" onclick="deleteSmoke('${s.id}')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            מחק רשומה
          </button>
        </div>
      </div>`;
  }

  function toggleSmokeCard(id) {
    document.getElementById(`sd-${id}`).classList.toggle('open');
    document.getElementById(`chev-${id}`).classList.toggle('open');
  }

  // ---- STATS ----
  function formatDuration(minutes) {
    if (minutes < 60) return `${Math.round(minutes)} דק'`;
    const h = Math.floor(minutes / 60);
    const m = Math.round(minutes % 60);
    return m > 0 ? `${h}ש' ${m}דק'` : `${h} שעות`;
  }

  function renderStats() {
    const smokes = getSmokes();
    document.getElementById('stat-total').textContent = smokes.length;

    if (smokes.length < 2) {
      document.getElementById('stat-avg-gap').textContent = '—';
      document.getElementById('stat-longest').textContent = '—';
    } else {
      const sorted = [...smokes].sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp));
      const gaps = [];
      for (let i=1; i<sorted.length; i++) {
        const diff = (new Date(sorted[i].timestamp) - new Date(sorted[i-1].timestamp)) / 60000;
        gaps.push(diff);
      }
      const avgGap = gaps.reduce((a,b)=>a+b,0) / gaps.length;
      const maxGap = Math.max(...gaps);
      document.getElementById('stat-avg-gap').textContent = formatDuration(avgGap);
      document.getElementById('stat-avg-gap-sub').textContent = 'בין סיגריה לסיגריה';
      document.getElementById('stat-longest').textContent = formatDuration(maxGap);
      document.getElementById('stat-longest-sub').textContent = 'הפסקה ארוכה ביותר';
    }

    // daily avg last 30 days
    const thirtyDaysAgo = new Date();
    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
    const last30 = smokes.filter(s => new Date(s.timestamp) >= thirtyDaysAgo);
    const dailyAvg = last30.length > 0 ? (last30.length / 30).toFixed(1) : 0;
    document.getElementById('stat-daily-avg').textContent = dailyAvg;
  }

  // ---- MONTHLY ----
  function renderMonthly() {
    const smokes = getSmokes();
    const grouped = {};
    smokes.forEach(s => {
      if (!grouped[s.monthKey]) grouped[s.monthKey] = 0;
      grouped[s.monthKey]++;
    });
    const months = Object.entries(grouped)
      .map(([key, count]) => ({ key, count, label: getMonthLabel(key) }))
      .sort((a,b) => b.key.localeCompare(a.key));

    const list = document.getElementById('monthly-list');
    const empty = document.getElementById('monthly-empty');
    if (months.length === 0) { list.innerHTML=''; empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    list.innerHTML = months.map(m => `
      <button class="month-card" onclick="openMonthDetail('${m.key}')">
        <div class="month-left">
          <div class="month-icon">📅</div>
          <div>
            <div class="month-name">${esc(m.label)}</div>
            <div class="month-count">${m.count} סיגריות</div>
          </div>
        </div>
        <div class="month-amount">
          <span class="month-total">${m.count}</span>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
      </button>`).join('');
  }

  function openMonthDetail(monthKey) {
    currentDetailMonth = monthKey;
    document.getElementById('month-list-view').classList.add('hidden');
    document.getElementById('month-detail').classList.remove('hidden');
    renderMonthDetail(monthKey);
  }

  function renderMonthDetail(monthKey) {
    const smokes = getSmokes().filter(s => s.monthKey === monthKey);
    document.getElementById('detail-label').textContent = getMonthLabel(monthKey);
    document.getElementById('detail-amount').textContent = smokes.length;
    document.getElementById('detail-sub').textContent = 'סיגריות';
    const list = document.getElementById('detail-smoke-list');
    const empty = document.getElementById('detail-empty');
    if (smokes.length === 0) { list.innerHTML=''; empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    list.innerHTML = smokes.map((s,i) => smokeCardHTML(s, smokes.length-i)).join('');
  }

  function closeMonthDetail() {
    currentDetailMonth = null;
    document.getElementById('month-detail').classList.add('hidden');
    document.getElementById('month-list-view').classList.remove('hidden');
  }


  function toggleSidebar() {
  document.querySelector(".sidebar").classList.toggle("open");
}

  function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // INIT
  renderAll();
</script>
</body>
</html>
